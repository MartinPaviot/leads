name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  typecheck-test:
    name: tsc + vitest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # The web app's tsc run needs more than Node's default ~2GB old space
      # on the runner (OOM-killed on the first CI run without this).
      NODE_OPTIONS: --max-old-space-size=6144
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Typecheck (web)
        run: pnpm --filter @leadsens/web tsc
      - name: Unit tests (web)
        run: pnpm --filter @leadsens/web test

  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No PR comments — keeps the job on read-only permissions.
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"
