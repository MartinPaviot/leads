<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Elevay UI Primitives (batch 3) — contact sheet</title>
<style>
  body{margin:0;background:#EDEDF2;font-family:'Inter',system-ui,sans-serif;padding:20px;}
  h1{font-size:14px;color:#1A1A2E;margin:0 0 16px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .cell{background:#FFF;border:1px solid #E8E8F0;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .cap{font-size:11px;font-weight:600;color:#64648C;padding:8px 12px;border-bottom:1px solid #E8E8F0;background:#FAFAFA;}
  iframe{width:100%;height:440px;border:0;display:block;}
</style>
</head>
<body>
<h1>elevay-design-system &middot; UI Primitives &middot; data + search (6)</h1>
<div class="grid">
  <div class="cell"><div class="cap">command-palette</div><iframe src="ui/command-palette.html"></iframe></div>
  <div class="cell"><div class="cap">data-table</div><iframe src="ui/data-table.html"></iframe></div>
  <div class="cell"><div class="cap">skeleton</div><iframe src="ui/skeleton.html"></iframe></div>
  <div class="cell"><div class="cap">bulk-actions-bar</div><iframe src="ui/bulk-actions-bar.html"></iframe></div>
  <div class="cell"><div class="cap">column-picker</div><iframe src="ui/column-picker.html"></iframe></div>
  <div class="cell"><div class="cap">smart-search-bar</div><iframe src="ui/smart-search-bar.html"></iframe></div>
</div>
</body>
</html>
