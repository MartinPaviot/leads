<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Elevay UI Primitives (batch 4) — contact sheet</title>
<style>
  body{margin:0;background:#EDEDF2;font-family:'Inter',system-ui,sans-serif;padding:20px;}
  h1{font-size:14px;color:#1A1A2E;margin:0 0 16px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .cell{background:#FFF;border:1px solid #E8E8F0;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .cap{font-size:11px;font-weight:600;color:#64648C;padding:8px 12px;border-bottom:1px solid #E8E8F0;background:#FAFAFA;}
  iframe{width:100%;height:380px;border:0;display:block;}
</style>
</head>
<body>
<h1>elevay-design-system &middot; UI Primitives &middot; dialogs + chrome (6)</h1>
<div class="grid">
  <div class="cell"><div class="cap">confirm-dialog</div><iframe src="ui/confirm-dialog.html"></iframe></div>
  <div class="cell"><div class="cap">destructive-confirm</div><iframe src="ui/destructive-confirm.html"></iframe></div>
  <div class="cell"><div class="cap">page-header</div><iframe src="ui/page-header.html"></iframe></div>
  <div class="cell"><div class="cap">shortcut-help</div><iframe src="ui/shortcut-help.html"></iframe></div>
  <div class="cell"><div class="cap">password-input</div><iframe src="ui/password-input.html"></iframe></div>
  <div class="cell"><div class="cap">company-logo</div><iframe src="ui/company-logo.html"></iframe></div>
</div>
</body>
</html>
