<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Elevay — ui finale + chat — contact sheet</title>
<style>
  body{margin:0;background:#EDEDF2;font-family:'Inter',system-ui,sans-serif;padding:20px;}
  h1{font-size:14px;color:#1A1A2E;margin:0 0 16px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .cell{background:#FFF;border:1px solid #E8E8F0;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .cap{font-size:11px;font-weight:600;color:#64648C;padding:8px 12px;border-bottom:1px solid #E8E8F0;background:#FAFAFA;}
  iframe{width:100%;height:360px;border:0;display:block;}
</style>
</head>
<body>
<h1>elevay-design-system &middot; ui/ finale (3) + chat/ start (3)</h1>
<div class="grid">
  <div class="cell"><div class="cap">ui/responsive-stack</div><iframe src="ui/responsive-stack.html"></iframe></div>
  <div class="cell"><div class="cap">ui/responsive-table</div><iframe src="ui/responsive-table.html"></iframe></div>
  <div class="cell"><div class="cap">ui/virtual-table</div><iframe src="ui/virtual-table.html"></iframe></div>
  <div class="cell"><div class="cap">chat/follow-up-pills</div><iframe src="chat/follow-up-pills.html"></iframe></div>
  <div class="cell"><div class="cap">chat/risk-callout</div><iframe src="chat/risk-callout.html"></iframe></div>
  <div class="cell"><div class="cap">chat/task-progress-card</div><iframe src="chat/task-progress-card.html"></iframe></div>
</div>
</body>
</html>
