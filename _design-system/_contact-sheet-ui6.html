<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Elevay UI Primitives (batch 6) — contact sheet</title>
<style>
  body{margin:0;background:#EDEDF2;font-family:'Inter',system-ui,sans-serif;padding:20px;}
  h1{font-size:14px;color:#1A1A2E;margin:0 0 16px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .cell{background:#FFF;border:1px solid #E8E8F0;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .cap{font-size:11px;font-weight:600;color:#64648C;padding:8px 12px;border-bottom:1px solid #E8E8F0;background:#FAFAFA;}
  iframe{width:100%;height:340px;border:0;display:block;}
</style>
</head>
<body>
<h1>elevay-design-system &middot; UI Primitives &middot; forms + chrome (6)</h1>
<div class="grid">
  <div class="cell"><div class="cap">auth-submit-button</div><iframe src="ui/auth-submit-button.html"></iframe></div>
  <div class="cell"><div class="cap">cascade-delete-modal</div><iframe src="ui/cascade-delete-modal.html"></iframe></div>
  <div class="cell"><div class="cap">display-panel</div><iframe src="ui/display-panel.html"></iframe></div>
  <div class="cell"><div class="cap">settings-header</div><iframe src="ui/settings-header.html"></iframe></div>
  <div class="cell"><div class="cap">navigation-progress</div><iframe src="ui/navigation-progress.html"></iframe></div>
  <div class="cell"><div class="cap">grow-textarea</div><iframe src="ui/grow-textarea.html"></iframe></div>
</div>
</body>
</html>
