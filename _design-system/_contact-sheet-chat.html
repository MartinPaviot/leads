</style>

<body>
<h1>elevay-design-system &middot; chat/ (5) + coaching/ (1)</h1>

  <div class="cell"><div class="cap">chat/chat-action-cards</div><iframe src="chat/chat-action-cards.html"></iframe></div>
  <div class="cell"><div class="cap">chat/email-preview-card</div><iframe src="chat/email-preview-card.html"></iframe></div>
  <div class="cell"><div class="cap">chat/streaming-skeleton</div><iframe src="chat/streaming-skeleton.html"></iframe></div>
  <div class="cell"><div class="cap">chat/copy-button</div><iframe src="chat/copy-button.html"></iframe></div>
  <div class="cell"><div class="cap">coaching/citation-chip</div><iframe src="coaching/citation-chip.html"></iframe></div>
