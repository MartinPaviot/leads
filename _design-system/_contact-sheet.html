<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Elevay AI UI — contact sheet</title>
<style>
  body{margin:0;background:#EDEDF2;font-family:'Inter',system-ui,sans-serif;padding:20px;}
  h1{font-size:14px;color:#1A1A2E;margin:0 0 16px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .cell{background:#FFF;border:1px solid #E8E8F0;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .cap{font-size:11px;font-weight:600;color:#64648C;padding:8px 12px;border-bottom:1px solid #E8E8F0;background:#FAFAFA;}
  iframe{width:100%;height:340px;border:0;display:block;}
</style>
</head>
<body>
<h1>elevay-design-system &middot; AI UI &middot; 6 components</h1>
<div class="grid">
  <div class="cell"><div class="cap">ai-thinking</div><iframe src="ai-ui/ai-thinking.html"></iframe></div>
  <div class="cell"><div class="cap">confidence-state</div><iframe src="ai-ui/confidence-state.html"></iframe></div>
  <div class="cell"><div class="cap">source-link</div><iframe src="ai-ui/source-link.html"></iframe></div>
  <div class="cell"><div class="cap">cited-claim</div><iframe src="ai-ui/cited-claim.html"></iframe></div>
  <div class="cell"><div class="cap">hallucination-fallback</div><iframe src="ai-ui/hallucination-fallback.html"></iframe></div>
  <div class="cell"><div class="cap">undo-toast</div><iframe src="ai-ui/undo-toast.html"></iframe></div>
</div>
</body>
</html>
