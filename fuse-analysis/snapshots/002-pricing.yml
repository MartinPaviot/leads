    - generic [ref=e685]:
      - heading "FAQ" [level=2] [ref=e687]
      - generic [ref=e688]:
        - generic [ref=e692]:
          - heading "How is FuseAI different from classic automation tools?" [level=6] [ref=e698] [cursor=pointer]
          - paragraph [ref=e701]: "FuseAI helps you build pipeline intelligently. Instead of relying on static lists or basic sequencing, FuseAI uses AI agents to: Discover leads automatically Enrich and verify contact data in real time Identify buying signals and intent Personalize outreach across channels You don’t just automate tasks, you automate outcomes. With FuseAI, you send fewer, smarter messages, and create more meaningful conversations that convert."
        - generic [ref=e705]:
          - heading "Is this for sales teams, agencies or founders?" [level=6] [ref=e711] [cursor=pointer]
          - paragraph [ref=e714]: "FuseAI is built for anyone responsible for outbound revenue growth: Sales teams scaling outbound Agencies managing multiple client pipelines Founders doing founder-led sales Whether you're a team of 1 or 100, Fuse replaces fragmented tools with one unified platform for prospecting, outreach, and pipeline management."
        - generic [ref=e718]:
          - heading "How does FuseAI find high-intent leads?" [level=6] [ref=e724] [cursor=pointer]
          - paragraph [ref=e727]: "FuseAI combines multiple data layers to identify the right prospects: Real-time signal tracking (job changes, hiring, activity) Access to a massive contact database (800M+ profiles) AI-driven lead scoring and enrichment Multi-source data validation for accuracy This means you’re not guessing who to reach out to, you’re targeting people who are already likely to convert."
        - generic [ref=e731]:
          - heading "How safe is it and does FuseAI risk my LinkedIn account?" [level=6] [ref=e737] [cursor=pointer]
          - paragraph [ref=e740]: "FuseAI is designed to operate safely within platform limits by: Using controlled automation flows Managing outreach pacing intelligently Avoiding spam-like behavior with human-like messaging Centralizing activity instead of using risky third-party hacks The goal is sustainable outbound — not aggressive automation that puts accounts at risk."
        - generic [ref=e744]:
          - heading "What kind of results can I realistically expect?" [level=6] [ref=e750] [cursor=pointer]
          - paragraph [ref=e753]: "FuseAI is built to drive measurable pipeline outcomes, not vanity metrics. Typical results include: Higher reply and conversion rates through personalization Faster pipeline generation with AI-led prospecting Reduced manual work (up to ~90% automation in workflows) ROI visibility within weeks, not months Instead of doing more work, your team focuses on closing — not chasing leads."
