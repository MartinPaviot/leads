title = "leadsens gitleaks config"

# Keep the FULL default ruleset active (never disable secret scanning) and add
# narrowly-scoped allowlists for known false positives.
[extend]
useDefault = true

[allowlist]
description = "spec-24/36 false positives — LinkedIn* TS identifiers + placeholder curl headers in API reference docs"
regexTarget = "line"
# (1) The default `linkedin-client-id` rule matches a 14-char token near
# "linkedin", colliding with PascalCase TypeScript identifiers like
# `LinkedInResult` / `LinkedInPort` / `LinkedInSendingAccount` across the spec-24
# port and the spec-36 Unipile code. These are type/function names, never
# credentials. PascalCase only — an all-caps `LINKEDIN_*` env-style line is NOT
# matched, so a genuine LinkedIn client secret is still caught.
regexes = [
  '''LinkedIn[A-Za-z]+''',
]
# (2) The `curl-auth-header` rule fires on the `-H 'X-API-KEY: YOUR_TOKEN'`
# placeholders in the spec-36 Unipile API reference (documentation curl
# examples, not real credentials). Scoped to the generated API reference docs.
paths = [
  '''_specs/.*/API\.md''',
]
