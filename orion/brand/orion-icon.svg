<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Orion">
  <defs>
    <linearGradient id="belt" x1="16" y1="48" x2="48" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17C3B2"/>
      <stop offset="0.5" stop-color="#2C6BED"/>
      <stop offset="1" stop-color="#FF7A3D"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2C6BED" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#2C6BED" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Night-sky ground -->
  <rect width="64" height="64" rx="14" fill="#0E0F14"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.06"/>
  <circle cx="32" cy="32" r="19" fill="url(#glow)"/>
  <!-- The "O" as a constellation: a ring of stars joined by hairlines -->
  <g stroke="url(#belt)" stroke-width="1.3" stroke-linejoin="round" stroke-opacity="0.6" fill="none">
    <polygon points="32,15 41.99,17.87 47.27,26.37 47.27,37.63 41.99,46.13 32,49 22.01,46.13 16.73,37.63 16.73,26.37 22.01,17.87"/>
  </g>
  <!-- Ring stars -->
  <g fill="url(#belt)">
    <circle cx="41.99" cy="17.87" r="1.9"/>
    <circle cx="47.27" cy="26.37" r="1.9"/>
    <circle cx="47.27" cy="37.63" r="1.9"/>
    <circle cx="41.99" cy="46.13" r="1.9"/>
    <circle cx="32" cy="49" r="1.9"/>
    <circle cx="22.01" cy="46.13" r="1.9"/>
    <circle cx="16.73" cy="37.63" r="1.9"/>
    <circle cx="16.73" cy="26.37" r="1.9"/>
    <circle cx="22.01" cy="17.87" r="1.9"/>
  </g>
  <!-- Lead star (top), brightest -->
  <circle cx="32" cy="15" r="3" fill="url(#belt)"/>
  <circle cx="31.2" cy="14.2" r="1" fill="#FFFFFF" fill-opacity="0.9"/>
  <!-- Orion's Belt, faint, inside the O (the Orion-specific nod) -->
  <g fill="#FFFFFF" fill-opacity="0.65">
    <circle cx="26" cy="38" r="1.4"/>
    <circle cx="32" cy="33.5" r="1.7"/>
    <circle cx="38" cy="29" r="1.4"/>
  </g>
  <path d="M26 38 L38 29" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="1"/>
</svg>
